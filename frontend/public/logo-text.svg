<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <!-- Text gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D2D2D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ethiopian flag gradient for accent -->
    <linearGradient id="flagAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#228B22;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Brand name with Ethiopian-inspired typography -->
  <g transform="translate(10, 0)">
    <!-- Main brand name -->
    <text x="0" y="35" font-family="Inter, system-ui, sans-serif" font-size="32" fill="url(#textGradient)" font-weight="800" letter-spacing="-1px">
      Zembile
    </text>
    
    <!-- Ethiopian flag color accent line -->
    <rect x="0" y="42" width="160" height="3" fill="url(#flagAccent)" rx="1.5"/>
    
    <!-- Amharic text (ዘምቢል) -->
    <text x="0" y="58" font-family="system-ui, sans-serif" font-size="14" fill="#666666" font-weight="400" letter-spacing="1.5px">
      ዘምቢል
    </text>
    
    <!-- Tagline -->
    <text x="0" y="72" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#888888" font-weight="500" letter-spacing="1.5px">
      ETHIOPIAN MARKETPLACE
    </text>
  </g>
  
  <!-- Decorative Ethiopian elements -->
  <g transform="translate(200, 15)">
    <!-- Ethiopian cross pattern -->
    <g opacity="0.6">
      <circle cx="10" cy="10" r="2" fill="#228B22"/>
      <circle cx="25" cy="15" r="1.5" fill="#FFD700"/>
      <circle cx="40" cy="20" r="1.2" fill="#DC143C"/>
      <circle cx="55" cy="12" r="1" fill="#228B22"/>
    </g>
    
    <!-- Traditional pattern -->
    <path d="M5 30 L20 35 L35 30 L50 35 L65 30" stroke="url(#flagAccent)" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
</svg>