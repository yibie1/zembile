<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <!-- Basket weave gradient -->
    <linearGradient id="basketWeave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#D2B48C;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#BC9A6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0826D;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="basketShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Traditional Ethiopian Zembile basket (icon only) -->
  <g transform="translate(40, 40)" filter="url(#basketShadow)">
    <!-- Basket main body (handbag shape) -->
    <path d="M-25 -5 C-25 -15, -18 -20, 0 -20 C18 -20, 25 -15, 25 -5 L22 25 C22 30, 17 32, 0 32 C-17 32, -22 30, -22 25 Z" 
          fill="url(#basketWeave)" stroke="#8B4513" stroke-width="1.5"/>
    
    <!-- Detailed weaving pattern -->
    <g stroke="#654321" stroke-width="0.8" fill="none" opacity="0.8">
      <!-- Horizontal weave -->
      <path d="M-20 -12 L20 -12 M-19 -7 L19 -7 M-18 -2 L18 -2 M-17 3 L17 3 M-16 8 L16 8 M-15 13 L15 13 M-14 18 L14 18 M-13 23 L13 23 M-12 28 L12 28"/>
      <!-- Vertical weave -->
      <path d="M-12 -18 L-10 30 M-4 -18 L-2 30 M4 -18 L6 30 M12 -18 L14 30"/>
      <!-- Diagonal weave for authenticity -->
      <path d="M-18 -9 L-13 -4 M-13 -9 L-8 -4 M-8 -9 L-3 -4 M-3 -9 L2 -4 M2 -9 L7 -4 M7 -9 L12 -4 M12 -9 L17 -4"/>
      <path d="M-18 6 L-13 11 M-13 6 L-8 11 M-8 6 L-3 11 M-3 6 L2 11 M2 6 L7 11 M7 6 L12 11 M12 6 L17 11"/>
    </g>
    
    <!-- Ethiopian flag colors as decorative band -->
    <rect x="-22" y="-25" width="44" height="3" fill="#228B22" rx="1.5"/>
    <rect x="-22" y="-28" width="44" height="3" fill="#FFD700" rx="1.5"/>
    <rect x="-22" y="-31" width="44" height="3" fill="#DC143C" rx="1.5"/>
    
    <!-- Traditional basket handles (handbag style) -->
    <path d="M-18 -8 C-23 -15, -23 -22, -18 -26 C-13 -22, -13 -15, -18 -8" 
          fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    <path d="M18 -8 C23 -15, 23 -22, 18 -26 C13 -22, 13 -15, 18 -8" 
          fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Ethiopian star symbol (subtle) -->
    <g opacity="0.4">
      <path d="M0,-8 L2.4,-2.4 L8,0 L2.4,2.4 L0,8 L-2.4,2.4 L-8,0 L-2.4,-2.4 Z" 
            fill="#FFD700" stroke="#228B22" stroke-width="0.5"/>
    </g>
    
    <!-- Basket rim highlight -->
    <ellipse cx="0" cy="-18" rx="22" ry="3" fill="#FFFFFF" opacity="0.4"/>
    
    <!-- Bottom shadow -->
    <ellipse cx="0" cy="32" rx="20" ry="3" fill="#000000" opacity="0.15"/>
  </g>
</svg>